{% set name = "atlas-schema" %}
{% set version = "0.3.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/45/33/4f88384403c3974c82f0296615c6e5f5114ca3d8fd920fa3196e4d619cb0/atlas_schema-{{ version }}.tar.gz
  sha256: e9fe77d3026ac13d1e7c1c139b35704829cccad67f267bb34abbd30fd3eee836

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling >=0.7
    - hatch-vcs >=0.3.0
  run:
    - python >={{ python_min }}
    - coffea >=2024.10.0
    - particle >=0.25.0
    # below are for coffea[dask]
    - distributed >=2024.3.0
    - bokeh !=3.0.*,>=2.4.2

test:
  imports:
    - atlas_schema
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/scipp-atlas/atlas-schema/
  license: Apache-2.0
  license_file: LICENSE
  summary: Helper python package for ATLAS Common NTuple Analysis work.
  description: |
    Python package containing schemas and helper functions enabling
    analyzers to work with ATLAS datasets (Monte Carlo and Data), using
    coffea.
  doc_url: https://atlas-schema.readthedocs.io/en/v{{ version }}/
  dev_url: https://github.com/scipp-atlas/atlas-schema/

extra:
  recipe-maintainers:
    - kratsg
